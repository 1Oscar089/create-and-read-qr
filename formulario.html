<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción de Datos QR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 40px auto;
            background-color: #f4f7f6;
        }
        .tarjeta {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        .campo {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }
        .campo label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .campo .valor {
            font-size: 22px;
            font-weight: bold;
            color: #007bff;
        }
        #contador {
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>✅ Datos Recibidos</h1>
        
        <div class="campo">
            <label>Nombre:</label>
            <div id="dato-nombre" class="valor">Cargando...</div>
        </div>

        <div class="campo">
            <label>NIE:</label>
            <div id="dato-nie" class="valor">Cargando...</div>
        </div>

        <div class="campo">
            <label>Fecha Actual (El Salvador):</label>
            <div id="dato-fecha" class="valor">Cargando...</div>
        </div>

        <div id="contador">Volviendo al escáner en 3 segundos...</div>
    </div>

    <script>
        // 1. Obtenemos los parámetros de la URL
        const parametros = new URLSearchParams(window.location.search);

        // 2. Buscamos los valores enviados desde el QR
        const nombre = parametros.get('Nombre') || 'No proporcionado';
        const nie = parametros.get('NIE') || 'No proporcionado';

        // 3. Obtenemos la fecha de El Salvador
        const opcionesFecha = {
            timeZone: 'America/El_Salvador',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        };
        const fechaActual = new Intl.DateTimeFormat('es-SV', opcionesFecha).format(new Date());

        // 4. Inyectamos los datos en el HTML
        document.getElementById('dato-nombre').innerText = nombre;
        document.getElementById('dato-nie').innerText = nie;
        document.getElementById('dato-fecha').innerText = fechaActual;

        // 5. Temporizador de 3 segundos (3000 milisegundos)
        setTimeout(() => {
            // Redirigimos de vuelta al index.html
            window.location.href = 'index.html';
        }, 3000);
    </script>
</body>
</html>
