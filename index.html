<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador y Lector de QR</title>
    
    <!-- Librería para CREAR QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Librería para LEER QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .seccion {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        input, button {
            padding: 8px;
            margin-top: 5px;
        }
        button {
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #lector-camara {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🛠️ Aplicación de QR</h1>

    <!-- SECCIÓN CREADOR -->
    <section class="seccion" id="creador">
        <h2>1. Crear Código QR de Datos</h2>
        <p>Rellena los datos y se generará un QR con un enlace.</p>
        
        <label>Nombre:</label><br>
        <input type="text" id="input-nombre" placeholder="Ej: Oscar Mejia"><br>
        
        <label>NIE / Documento:</label><br>
        <input type="text" id="input-nie" placeholder="Ej: 123456"><br><br>
        
        <button id="btn-crear">Generar QR</button>
        
        <div id="contenedor-qr" style="margin-top: 20px;"></div>
    </section>

    <!-- SECCIÓN LECTOR -->
    <section class="seccion" id="lector">
        <h2>2. Leer Código QR</h2>
        <p>Pulsa el botón y apunta con la cámara al QR generado.</p>
        
        <button id="btn-iniciar-lector">Iniciar Cámara</button>
        <button id="btn-detener-lector" style="display: none; background-color: #dc3545;">Detener Cámara</button>
        
        <div id="lector-camara" style="margin-top: 15px;"></div>
        <div id="resultado-lector" style="margin-top: 15px; font-weight: bold; color: green;"></div>
    </section>

    <script>
        // ==========================================
        // LÓGICA DEL CREADOR
        // ==========================================
        const btnCrear = document.getElementById('btn-crear');
        const inputNombre = document.getElementById('input-nombre');
        const inputNie = document.getElementById('input-nie');
        const contenedorQR = document.getElementById('contenedor-qr');

        btnCrear.addEventListener('click', () => {
            const nombre = inputNombre.value.trim();
            const nie = inputNie.value.trim();

            if (nombre === '' || nie === '') {
                alert('Por favor, rellena el Nombre y el NIE.');
                return;
            }

            // Codificamos los textos para que sean válidos en una URL (cambiamos espacios por %20, etc)
            const nombreUrl = encodeURIComponent(nombre);
            const nieUrl = encodeURIComponent(nie);

            // Creamos el enlace. Este enlace apunta a "formulario.html" y le pasa los datos
            // Nota: como veremos en el siguiente paso, este archivo lo crearemos después
            const urlDestino = `formulario.html?nombre=${nombreUrl}&nie=${nieUrl}`;

            contenedorQR.innerHTML = ''; // Limpiamos el anterior

            // Generamos el QR. Usamos un nivel de corrección medio (M) para que no Overflow
            new QRCode(contenedorQR, {
                text: urlDestino,         
                width: 200,          
                height: 200,         
                correctLevel: QRCode.CorrectLevel.M // Cambiamos a 'M' para evitar el error de longitud
            });
        });

        // ==========================================
        // LÓGICA DEL LECTOR
        // ==========================================
        const btnIniciar = document.getElementById('btn-iniciar-lector');
        const btnDetener = document.getElementById('btn-detener-lector');
        const divCamara = document.getElementById('lector-camara');
        const divResultado = document.getElementById('resultado-lector');

        // Creamos la instancia del lector de html5-qrcode
        const html5QrCode = new Html5Qrcode("lector-camara");

        btnIniciar.addEventListener('click', () => {
            btnIniciar.style.display = 'none';
            btnDetener.style.display = 'inline-block';
            divResultado.innerText = '';

            // Iniciamos la cámara (usamos { facingMode: "environment" } para usar la cámara trasera en móviles)
            html5QrCode.start(
                { facingMode: "environment" }, 
                {
                    fps: 10,    // Fotogramas por segundo
                    qrbox: { width: 250, height: 250 } // Tamaño del cuadro de escaneo
                },
                (decodedText) => {
                    // ¡Éxito! Se leyó un QR
                    divResultado.innerText = 'QR Leído: ' + decodedText;
                    
                    // Paramos la cámara automáticamente tras leer
                    html5QrCode.stop().then(() => {
                        btnIniciar.style.display = 'inline-block';
                        btnDetener.style.display = 'none';
                        
                        // Aquí en el futuro redirigiremos a la URL leída
                        alert("¡Código leído con éxito! En el siguiente paso abriremos este enlace.");
                    }).catch((err) => {
                        console.error("Error al detener la cámara", err);
                    });
                },
                (errorMessage) => {
                    // Esto se ejecuta muchas veces por segundo si no encuentra un QR. Lo ignoramos.
                }
            ).catch((err) => {
                alert("Error al acceder a la cámara. Asegúrate de dar permisos. Mira la consola para más detalles.");
                console.error(err);
                btnIniciar.style.display = 'inline-block';
                btnDetener.style.display = 'none';
            });
        });

        btnDetener.addEventListener('click', () => {
            html5QrCode.stop().then(() => {
                btnIniciar.style.display = 'inline-block';
                btnDetener.style.display = 'none';
            }).catch((err) => {
                console.error(err);
            });
        });
    </script>
</body>
</html>
