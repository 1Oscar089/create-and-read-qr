<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador y Lector de QR Dinámico</title>
    
    <!-- Librería para CREAR QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Librería para LEER QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .seccion {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        input, button {
            padding: 8px;
            margin-top: 5px;
        }
        button {
            cursor: pointer;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .btn-azul { background-color: #007bff; }
        .btn-azul:hover { background-color: #0056b3; }
        .btn-verde { background-color: #28a745; }
        .btn-verde:hover { background-color: #218838; }
        .btn-rojo { background-color: #dc3545; }
        
        .par-dato {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .par-dato input {
            margin-top: 0;
            flex: 1;
        }
        #lector-camara {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <a href="formulario.html">Ir a formulario</a>
    <h1>🛠️ Aplicación de QR Dinámico</h1>

    <!-- SECCIÓN CREADOR -->
    <section class="seccion" id="creador">
        <h2>1. Crear Código QR</h2>
        
        <label>Enlace base (URL limpia):</label><br>
        <input type="text" id="input-url" placeholder="Ej: formulario.html o https://midominio.com" style="width: 100%; max-width: 400px;"><br><br>
        
        <label>Datos a enviar:</label><br>
        <!-- Aquí se inyectarán los campos dinámicos -->
        <div id="contenedor-campos"></div>
        
        <button id="btn-add-campo" class="btn-verde">+ Añadir campo</button>
        <br><br>
        
        <button id="btn-crear" class="btn-azul">Generar QR</button>
        
        <div id="contenedor-qr" style="margin-top: 20px;"></div>
    </section>

    <!-- SECCIÓN LECTOR -->
    <section class="seccion" id="lector">
        <h2>2. Leer Código QR</h2>
        <p>Pulsa el botón Abrir Cámara.</p>
        
        <button id="btn-iniciar-lector" class="btn-azul">Iniciar Cámara</button>
        <button id="btn-detener-lector" class="btn-rojo" style="display: none;">Detener Cámara</button>
        
        <div id="lector-camara" style="margin-top: 15px;"></div>
        <div id="resultado-lector" style="margin-top: 15px; font-weight: bold; color: green;"></div>
    </section>

    <script>
        // ==========================================
        // LÓGICA DEL CREADOR DINÁMICO
        // ==========================================
        const inputUrl = document.getElementById('input-url');
        const contenedorCampos = document.getElementById('contenedor-campos');
        const btnAddCampo = document.getElementById('btn-add-campo');
        const btnCrear = document.getElementById('btn-crear');
        const contenedorQR = document.getElementById('contenedor-qr');

        // Función para crear un nuevo par de inputs (Label y Dato)
        function crearCampoDinamico() {
            const divPar = document.createElement('div');
            divPar.className = 'par-dato';

            const inputLabel = document.createElement('input');
            inputLabel.type = 'text';
            inputLabel.placeholder = 'Label (ej: nombre)';
            inputLabel.className = 'input-label';

            const igual = document.createElement('span');
            igual.innerText = '=';

            const inputValor = document.createElement('input');
            inputValor.type = 'text';
            inputValor.placeholder = 'Dato (ej: Oscar)';
            inputValor.className = 'input-valor';

            const btnEliminar = document.createElement('button');
            btnEliminar.innerText = 'X';
            btnEliminar.className = 'btn-rojo';
            btnEliminar.addEventListener('click', () => {
                divPar.remove(); // Elimina este bloque al pulsar X
            });

            divPar.appendChild(inputLabel);
            divPar.appendChild(igual);
            divPar.appendChild(inputValor);
            divPar.appendChild(btnEliminar);

            contenedorCampos.appendChild(divPar);
        }

        // Iniciamos con un campo vacío por defecto
        crearCampoDinamico();

        // Evento para el botón "+"
        btnAddCampo.addEventListener('click', crearCampoDinamico);

        // Evento para generar el QR
        btnCrear.addEventListener('click', () => {
            const urlBase = inputUrl.value.trim();
            if (urlBase === '') {
                alert('Por favor, escribe el enlace base limpio.');
                return;
            }

            // Buscamos todos los bloques de campos que hemos creado
            const pares = document.querySelectorAll('.par-dato');
            const parametros = [];

            pares.forEach(par => {
                const label = par.querySelector('.input-label').value.trim();
                const valor = par.querySelector('.input-valor').value.trim();
                
                // Si el usuario escribió algo en el label, lo añadimos
                if (label !== '') {
                    // Codificamos el texto para URL
                    const paramStr = `${encodeURIComponent(label)}=${encodeURIComponent(valor)}`;
                    parametros.push(paramStr);
                }
            });

            // Construimos la URL final: enlace + ?param1=valor1&param2=valor2
            let urlFinal = urlBase;
            if (parametros.length > 0) {
                urlFinal += '?' + parametros.join('&');
            }

            contenedorQR.innerHTML = ''; // Limpiamos el QR anterior

            // Generamos el QR
            new QRCode(contenedorQR, {
                text: urlFinal,         
                width: 200,          
                height: 200,         
                correctLevel: QRCode.CorrectLevel.M 
            });
        });

        // ==========================================
        // LÓGICA DEL LECTOR
        // ==========================================
        const btnIniciar = document.getElementById('btn-iniciar-lector');
        const btnDetener = document.getElementById('btn-detener-lector');
        const divCamara = document.getElementById('lector-camara');
        const divResultado = document.getElementById('resultado-lector');

        const html5QrCode = new Html5Qrcode("lector-camara");

        btnIniciar.addEventListener('click', () => {
            btnIniciar.style.display = 'none';
            btnDetener.style.display = 'inline-block';
            divResultado.innerText = '';

            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    divResultado.innerText = 'QR Leído: ' + decodedText;
                    html5QrCode.stop().then(() => {
                        btnIniciar.style.display = 'inline-block';
                        btnDetener.style.display = 'none';
                        alert("¡Código leído! En el siguiente paso abriremos este enlace automáticamente.");
                    }).catch((err) => console.error(err));
                },
                (errorMessage) => { /* Ignoramos errores de escaneo continuo */ }
            ).catch((err) => {
                alert("Error al acceder a la cámara.");
                console.error(err);
                btnIniciar.style.display = 'inline-block';
                btnDetener.style.display = 'none';
            });
        });

        btnDetener.addEventListener('click', () => {
            html5QrCode.stop().then(() => {
                btnIniciar.style.display = 'inline-block';
                btnDetener.style.display = 'none';
            }).catch((err) => console.error(err));
        });
    </script>
</body>
</html>
